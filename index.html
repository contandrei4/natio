<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decode Counter – FRC Scouting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --yellow: #e8c93a; --black: #111; --white: #f5f5f0; --gray: #2a2a2a; --red: #e04b2a; --green: #4caf87; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 16px; background-image: radial-gradient(circle at 20% 20%, rgba(232,201,58,0.05) 0%, transparent 50%); }
  .app-container { width: 100%; max-width: 420px; background: #161616; border: 1px solid #333; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  .screen { display: none; padding: 24px; }
  .screen.active { display: block; }
  h1 { font-family: 'Bebas Neue'; font-size: 3rem; color: var(--yellow); letter-spacing: 2px; line-height: 0.9; margin-bottom: 8px; }
  .subtitle { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-bottom: 32px; }
  .input-group { margin-bottom: 24px; }
  .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--yellow); margin-bottom: 8px; font-weight: 700; }
  input, select { width: 100%; background: var(--gray); border: 1px solid #333; padding: 14px; color: white; font-family: 'Space Mono', monospace; outline: none; }
  .counter-card { background: #1a1a1a; border: 1px solid #333; padding: 20px; margin-bottom: 16px; }
  .counter-label { font-family: 'Bebas Neue'; font-size: 1.2rem; color: #888; margin-bottom: 12px; display: flex; justify-content: space-between; }
  .btn-main { flex-grow: 1; background: var(--yellow); color: black; border: none; padding: 16px; font-family: 'Bebas Neue'; font-size: 1.5rem; cursor: pointer; }
  .btn-undo { background: #333; color: #888; border: none; padding: 16px; font-size: 0.7rem; font-family: 'Space Mono'; cursor: pointer; }
  .count-display { font-size: 2.5rem; font-weight: 700; min-width: 60px; text-align: center; font-family: 'Bebas Neue'; }
  .report-box { background: var(--gray); border-left: 4px solid var(--yellow); padding: 20px; margin-bottom: 24px; }
  .parking-group { display: flex; align-items: center; gap: 12px; background: #1a1a1a; border: 1px solid #333; padding: 15px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="app-container">
  <div id="screen-login" class="screen active">
    <h1>DECODE<br>SCOUTING</h1>
    <div class="subtitle">National Initialization</div>
    <div class="input-group">
      <label>Scouter ID</label>
      <input type="text" id="scouter-id" placeholder="EX: SCOUT_01">
    </div>
    <button class="btn-main" id="btn-login" style="width:100%;" onclick="startApp()">Initialize</button>
  </div>

  <div id="screen-scouter" class="screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h1 style="font-size:1.5rem">MATCH DATA</h1>
      <span id="display-id" style="color:var(--yellow); font-size:0.7rem; font-weight:700;"></span>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
      <div class="input-group"><label>Team Number</label><input type="number" id="team-number" placeholder="0000"></div>
      <div class="input-group"><label>Position</label>
        <select id="pos-select">
          <option value="R ap">R ap</option><option value="R dep">R dep</option>
          <option value="A ap">A ap</option><option value="A dep">A dep</option>
        </select>
      </div>
    </div>
    <div class="counter-card">
      <div class="counter-label">AUTO IN</div>
      <div class="controls" style="display:flex; align-items:center; gap:16px;">
        <button class="btn-main" onclick="change('auto_in', 1)">+1 Piece</button>
        <div class="count-display" id="val-auto-in">0</div>
        <button class="btn-undo" onclick="change('auto_in', -1)">Undo</button>
      </div>
    </div>
    <div class="counter-card" style="border-color: var(--red);">
      <div class="counter-label" style="color:var(--red)">AUTO MISSED</div>
      <div class="controls" style="display:flex; align-items:center; gap:16px;">
        <button class="btn-main" style="background:var(--red); color:white" onclick="change('auto_missed', 1)">+1 Miss</button>
        <div class="count-display" id="val-auto-missed">0</div>
        <button class="btn-undo" onclick="change('auto_missed', -1)">Undo</button>
      </div>
    </div>
    <div class="counter-card" style="border-color: var(--green);">
      <div class="counter-label" style="color:var(--green)">SCOR (TELEOP)</div>
      <div class="controls" style="display:flex; align-items:center; gap:16px;">
        <button class="btn-main" style="background:var(--green); color:white" onclick="change('teleop', 1)">+1 Score</button>
        <div class="count-display" id="val-teleop">0</div>
        <button class="btn-undo" onclick="change('teleop', -1)">Undo</button>
      </div>
    </div>
    <div class="parking-group">
      <input type="checkbox" id="parking-check" style="width:20px; height:20px;">
      <label style="color:var(--yellow); font-size:0.8rem; font-weight:700;">PARCARE BIFATĂ (P)</label>
    </div>
    <div class="input-group"><label>RP-uri Total</label><input type="number" id="rp-input" value="0"></div>
    <button class="btn-main" style="width:100%; padding:20px;" onclick="showReport()">Generate Report</button>
  </div>

  <div id="screen-report" class="screen">
    <h1>REPORT</h1>
    <div class="report-box" id="report-content"></div>
    <button class="btn-main" id="btn-send" style="width:100%; padding:20px; margin-bottom:12px;" onclick="finalizeAndSend()">Confirm & Send</button>
    <button class="btn-undo" style="width:100%;" onclick="switchScreen('screen-scouter')">Back</button>
  </div>
</div>

<script>
  let state = { auto_in: 0, auto_missed: 0, teleop: 0 };
  let sessionId = "";

  const URL_AUTH_LOG = "https://script.google.com/macros/s/AKfycbxoPEqXdcJyZvlc--Q2Fb88vYBZank5exIzt_NwPe8BB9J1wpHgkAVoY5Quze7DgqeE/exec";
  const URL_NATIONALA = "https://script.google.com/macros/s/AKfycbwA3kxFk8JzP9gfc8CYXw6u-0ksTkN5lCK_tQblggGeOpriHyYBq5iam1m_qSADya7N/exec";

  // LOGIN VALIDATION (JSONP bypasses CORS error)
  function startApp() {
    const idInput = document.getElementById('scouter-id').value.trim().toUpperCase();
    if (!idInput) return alert("Enter Scouter ID!");

    const btn = document.getElementById('btn-login');
    btn.textContent = "VERIFYING...";
    btn.disabled = true;

    // We use a global function name for Google Script to call back
    const callbackName = 'auth_cb_' + Math.floor(Math.random() * 1000000);
    window[callbackName] = function(response) {
      if (response === 'valid') {
        sessionId = idInput;
        document.getElementById('display-id').textContent = "ID: " + sessionId;
        switchScreen('screen-scouter');
      } else {
        alert("ID Scouter Invalid!");
        btn.textContent = "Initialize";
        btn.disabled = false;
      }
      delete window[callbackName];
      document.body.removeChild(script);
    };

    const script = document.createElement('script');
    script.src = `${URL_AUTH_LOG}?action=auth&id=${idInput}&callback=${callbackName}`;
    document.body.appendChild(script);
    
    // Safety timeout
    setTimeout(() => {
      if (btn.disabled && !sessionId) {
        alert("Server timeout. Check internet or ID.");
        btn.disabled = false; btn.textContent = "Initialize";
      }
    }, 5000);
  }

  function change(key, val) {
    state[key] = Math.max(0, state[key] + val);
    document.getElementById(`val-${key.replace('_', '-')}`).textContent = state[key];
  }

  function showReport() {
    const team = document.getElementById('team-number').value;
    if (!team) return alert("Enter Team Number!");
    const total = state.auto_in + state.auto_missed;
    const isP = document.getElementById('parking-check').checked;
    const autoData = `${state.auto_in}(${total})${isP ? 'P' : ''}`;
    
    document.getElementById('report-content').innerHTML = `
      <p>TEAM: ${team}</p>
      <p>POS: ${document.getElementById('pos-select').value}</p>
      <p>AUTO: ${autoData}</p>
      <p>TELEOP SCOR: ${state.teleop}</p>
      <p>RPs: ${document.getElementById('rp-input').value}</p>
    `;
    switchScreen('screen-report');
  }

  async function finalizeAndSend() {
    const btn = document.getElementById('btn-send');
    btn.textContent = "TRANSMITTING...";
    btn.disabled = true;

    const team = document.getElementById('team-number').value;
    const pos = document.getElementById('pos-select').value;
    const total = state.auto_in + state.auto_missed;
    const isP = document.getElementById('parking-check').checked;
    const autoData = `${state.auto_in}(${total})${isP ? 'P' : ''}`;
    const rp = document.getElementById('rp-input').value;

    try {
      // 1. Log activity (GET - no cors)
      fetch(`${URL_AUTH_LOG}?action=log&id=${sessionId}&ora=${new Date().toLocaleTimeString()}&meci=${team}&team=${team}`, {mode: 'no-cors'});

      // 2. Main Data (POST to Nationala)
      await fetch(URL_NATIONALA, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          team: team, position: pos, autoData: autoData, scor: state.teleop, rp: rp
        })
      });

      alert("Data synchronized successfully!");
      resetForm();
      switchScreen('screen-scouter');
    } catch (e) {
      alert("Error sending data. Try again.");
    } finally {
      btn.textContent = "Confirm & Send";
      btn.disabled = false;
    }
  }

  function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function resetForm() {
    state = { auto_in: 0, auto_missed: 0, teleop: 0 };
    document.getElementById('team-number').value = '';
    document.getElementById('rp-input').value = '0';
    document.getElementById('parking-check').checked = false;
    document.querySelectorAll('.count-display').forEach(d => d.textContent = '0');
  }
</script>
</body>
</html>
