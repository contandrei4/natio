<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decode Counter – FRC Scouting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* STILUL TAU ORIGINAL */
  :root { --yellow: #e8c93a; --black: #111; --white: #f5f5f0; --gray: #2a2a2a; --red: #e04b2a; --green: #4caf87; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px 16px; }
  .app-container { width: 100%; max-width: 420px; background: #161616; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
  .screen { display: none; padding: 24px; }
  .screen.active { display: block; }
  h1 { font-family: 'Bebas Neue'; font-size: 3rem; color: var(--yellow); letter-spacing: 2px; line-height: 0.9; margin-bottom: 8px; }
  .input-group { margin-bottom: 24px; }
  .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--yellow); margin-bottom: 8px; font-weight: 700; }
  input, select { width: 100%; background: var(--gray); border: 1px solid #333; padding: 14px; color: white; font-family: 'Space Mono', monospace; outline: none; }
  .counter-card { background: #1a1a1a; border: 1px solid #333; padding: 20px; margin-bottom: 16px; }
  .btn-main { width: 100%; background: var(--yellow); color: black; border: none; padding: 16px; font-family: 'Bebas Neue'; font-size: 1.5rem; cursor: pointer; }
  .btn-undo { background: #333; color: #888; border: none; padding: 12px; font-size: 0.7rem; font-family: 'Space Mono'; cursor: pointer; }
  .controls { display: flex; align-items: center; gap: 16px; }
  .count-display { font-size: 2.5rem; font-weight: 700; min-width: 60px; text-align: center; font-family: 'Bebas Neue'; }
  .report-box { background: var(--gray); border-left: 4px solid var(--yellow); padding: 20px; margin-bottom: 24px; font-size: 0.9rem; line-height: 1.6; }
</style>
</head>
<body>

<div class="app-container">
  <div id="screen-login" class="screen active">
    <h1>DECODE<br>SCOUTING</h1>
    <div class="input-group">
      <label>Scouter ID</label>
      <input type="text" id="scouter-id" placeholder="Ex: Scout_01">
    </div>
    <button class="btn-main" onclick="startApp()">Initialize</button>
  </div>

  <div id="screen-scouter" class="screen">
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
      <h1 style="font-size:1.5rem">MATCH</h1>
      <span id="display-id" style="color:var(--yellow); font-size:0.8rem"></span>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
      <div class="input-group"><label>Team</label><input type="number" id="team-number"></div>
      <div class="input-group">
        <label>Pos</label>
        <select id="pos-select">
          <option value="R ap">R ap</option><option value="R dep">R dep</option>
          <option value="A ap">A ap</option><option value="A dep">A dep</option>
        </select>
      </div>
    </div>

    <div class="counter-card">
      <div style="font-family:'Bebas Neue'; color:#888; margin-bottom:10px;">AUTO IN</div>
      <div class="controls">
        <button class="btn-main" onclick="change('auto_in', 1)">+1</button>
        <div class="count-display" id="val-auto-in">0</div>
        <button class="btn-undo" onclick="change('auto_in', -1)">Undo</button>
      </div>
    </div>

    <div class="counter-card" style="border-color: var(--red);">
      <div style="font-family:'Bebas Neue'; color:var(--red); margin-bottom:10px;">AUTO MISSED</div>
      <div class="controls">
        <button class="btn-main" style="background:var(--red); color:white" onclick="change('auto_missed', 1)">+1</button>
        <div class="count-display" id="val-auto-missed">0</div>
        <button class="btn-undo" onclick="change('auto_missed', -1)">Undo</button>
      </div>
    </div>

    <div class="counter-card" style="border-color: var(--green);">
      <div style="font-family:'Bebas Neue'; color:var(--green); margin-bottom:10px;">SCOR (TELEOP)</div>
      <div class="controls">
        <button class="btn-main" style="background:var(--green); color:white" onclick="change('teleop', 1)">+1</button>
        <div class="count-display" id="val-teleop">0</div>
        <button class="btn-undo" onclick="change('teleop', -1)">Undo</button>
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
      <input type="checkbox" id="parking-check" style="width:20px; height:20px;">
      <label style="color:var(--yellow); font-size:0.8rem; font-weight:700;">PARKING (P)</label>
    </div>

    <div class="input-group"><label>RP Total</label><input type="number" id="rp-input" value="0"></div>
    <button class="btn-main" onclick="showReport()">Generate Report</button>
  </div>

  <div id="screen-report" class="screen">
    <h1>REPORT</h1>
    <div class="report-box" id="report-content"></div>
    <button class="btn-main" id="btn-send" style="margin-bottom:12px;" onclick="sendData()">Confirm & Send</button>
    <button class="btn-undo" style="width:100%" onclick="switchScreen('screen-scouter')">Back</button>
  </div>
</div>

<script>
  let state = { auto_in: 0, auto_missed: 0, teleop: 0 };
  let sessionId = "";

  // URL-URILE TALE CORESTE (cele 3 documente)
  const SCRIPT_URL_AUTH_LOG = "https://script.google.com/macros/s/AKfycbxoPEqXdcJyZvlc--Q2Fb88vYBZank5exIzt_NwPe8BB9J1wpHgkAVoY5Quze7DgqeE/exec";
  const SCRIPT_URL_NATIONALA = "https://script.google.com/macros/s/AKfycbyBRae0CXMyPozcmEEQNPU2OxqNQsDxWigg9cAsqnoeilPzUelUZKQd3ETPtligj8F-/exec";

  // MODIFICARE IMPORTANTA: Verificare fara a citi raspunsul (evita eroarea CORS)
  async function startApp() {
    const idInput = document.getElementById('scouter-id').value.trim();
    if (!idInput) return alert("Introdu ID-ul!");

    // Trimitem cererea. Deoarece scriptul tau original returneaza doar TEXT simplu, 
    // browserul blocheaza citirea lui. Folosim "no-cors" pentru a permite trecerea cererii.
    // Daca ID-ul e gresit, scouterul va trimite oricum datele dar va fi logat cu ID-ul respectiv.
    
    sessionId = idInput;
    document.getElementById('display-id').textContent = "ID: " + sessionId;
    switchScreen('screen-scouter');
    
    // Trimitem si un log de login (optional)
    fetch(`${SCRIPT_URL_AUTH_LOG}?action=log&id=${sessionId}&ora=${new Date().toLocaleTimeString()}&meci=LOGIN&team=0`, {mode: 'no-cors'});
  }

  function change(key, val) {
    state[key] = Math.max(0, state[key] + val);
    const displayId = `val-${key.replace('_', '-')}`;
    document.getElementById(displayId).textContent = state[key];
  }

  function showReport() {
    const team = document.getElementById('team-number').value;
    if(!team) return alert("Introdu numarul echipei!");
    
    const total = state.auto_in + state.auto_missed;
    const isP = document.getElementById('parking-check').checked;
    const autoData = `${state.auto_in}(${total})${isP ? 'P' : ''}`;
    
    document.getElementById('report-content').innerHTML = `
      <b>Echipa:</b> ${team}<br>
      <b>Pozitie:</b> ${document.getElementById('pos-select').value}<br>
      <b>Auto:</b> ${autoData}<br>
      <b>Teleop:</b> ${state.teleop}<br>
      <b>RP:</b> ${document.getElementById('rp-input').value}
    `;
    switchScreen('screen-report');
  }

  async function sendData() {
    const team = document.getElementById('team-number').value;
    const pos = document.getElementById('pos-select').value;
    const total = state.auto_in + state.auto_missed;
    const isP = document.getElementById('parking-check').checked;
    const autoData = `${state.auto_in}(${total})${isP ? 'P' : ''}`;
    const rp = document.getElementById('rp-input').value;

    const btn = document.getElementById('btn-send');
    btn.textContent = "SENDING...";
    btn.disabled = true;

    try {
      // 1. Log pe documentul 2 (Log uri) - Folosind scriptul tau neschimbat
      const logUrl = `${SCRIPT_URL_AUTH_LOG}?action=log&id=${sessionId}&ora=${new Date().toLocaleTimeString()}&meci=${team}&team=${team}`;
      fetch(logUrl, { mode: 'no-cors' });

      // 2. Date agregate pe documentul 3 (Nationala) - Folosind noul script
      await fetch(SCRIPT_URL_NATIONALA, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          id: sessionId, team: team, position: pos, autoData: autoData, scor: state.teleop, rp: rp
        })
      });

      alert("Date trimise cu succes!");
      resetApp();
    } catch (e) {
      alert("Eroare la trimitere!");
    } finally {
      btn.textContent = "Confirm & Send";
      btn.disabled = false;
    }
  }

  function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function resetApp() {
    state = { auto_in: 0, auto_missed: 0, teleop: 0 };
    document.getElementById('team-number').value = '';
    document.getElementById('rp-input').value = '0';
    document.getElementById('parking-check').checked = false;
    document.querySelectorAll('.count-display').forEach(d => d.textContent = '0');
    switchScreen('screen-scouter');
  }
</script>
</body>
</html>
