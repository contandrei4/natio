<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decode Counter – FTC Scouting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #e8c93a;
    --black: #111;
    --white: #f5f5f0;
    --gray: #2a2a2a;
    --red: #e04b2a;
    --green: #4caf87;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(232,201,58,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(224,75,42,0.05) 0%, transparent 50%);
  }

  .container { width: 100%; max-width: 440px; position: relative; }

  .header { margin-bottom: 32px; border-bottom: 1px solid #333; padding-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-end; }
  h1 { font-family: 'Bebas Neue'; font-size: 3.5rem; line-height: 0.8; color: var(--yellow); letter-spacing: -1px; }
  .status-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--green); }
  .version { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 2px; }

  .screen { display: none; animation: fadeIn 0.4s ease-out; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .card { background: var(--gray); padding: 24px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #333; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--yellow); }
  
  .card-label { font-size: 0.65rem; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; display: block; font-weight: 700; }

  .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .input-field { background: #1a1a1a; border: 1px solid #444; padding: 16px; color: var(--white); font-family: 'Space Mono'; width: 100%; transition: border-color 0.3s; }
  .input-field:focus { border-color: var(--yellow); outline: none; }

  .counter-box { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; background: #1a1a1a; padding: 8px; border-radius: 4px; }
  .btn-circle { width: 56px; height: 56px; border-radius: 4px; border: none; font-family: 'Bebas Neue'; font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .btn-plus { background: var(--yellow); color: var(--black); }
  .btn-plus:active { transform: scale(0.95); background: #fff; }
  .btn-minus { background: #333; color: #888; }
  .counter-val { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--white); min-width: 60px; text-align: center; }

  .btn-main { width: 100%; background: var(--yellow); color: var(--black); border: none; padding: 20px; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; transition: all 0.3s; margin-top: 12px; }
  .btn-main:hover { background: #fff; }

  .report-box { background: #1a1a1a; border: 1px solid #333; padding: 20px; margin-top: 24px; }
  .report-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a2a2a; }
  .report-key { font-size: 0.7rem; color: #888; text-transform: uppercase; }
  .report-val { color: var(--yellow); font-weight: 700; }

  /* Intel Search Styles */
  .intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
  .i-box { background: #000; padding: 12px; border: 1px solid #333; }
  .i-label { font-size: 0.6rem; color: var(--yellow); text-transform: uppercase; }
  .i-val { font-family: 'Bebas Neue'; font-size: 1.8rem; color: #fff; }
  .note-box { background: #1a1a1a; padding: 12px; border-left: 2px solid var(--yellow); font-size: 0.8rem; color: #ccc; margin-top: 5px; }

</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1>DECODE</h1>
      <div class="version"><span class="status-dot"></span>System Active</div>
    </div>
    <button class="btn-main" id="nav-btn" onclick="toggleSearch()" style="width: auto; padding: 8px 16px; margin: 0; font-size: 1rem;">SEARCH INTEL</button>
  </div>

  <div id="screen-scouter" class="screen active">
    <div class="input-group">
      <div><label class="card-label">Match No.</label><input type="number" id="match-number" class="input-field" placeholder="00"></div>
      <div><label class="card-label">Team No.</label><input type="number" id="team-number" class="input-field" placeholder="0000"></div>
    </div>

    <div class="card">
      <span class="card-label">Autonomous Phase</span>
      <div class="counter-box">
        <span style="font-size: 0.8rem;">PIECES SCORED</span>
        <div style="display: flex; align-items: center;">
          <button class="btn-circle btn-minus" onclick="updateCount('auto_in', -1)">-</button>
          <span class="counter-val" id="auto-in-count">0</span>
          <button class="btn-circle btn-plus" onclick="updateCount('auto_in', 1)">+</button>
        </div>
      </div>
      <div class="counter-box">
        <span style="font-size: 0.8rem; color: var(--red);">PIECES MISSED</span>
        <div style="display: flex; align-items: center;">
          <button class="btn-circle btn-minus" onclick="updateCount('auto_missed', -1)">-</button>
          <span class="counter-val" id="auto-missed-count">0</span>
          <button class="btn-circle btn-plus" onclick="updateCount('auto_missed', 1)" style="background: var(--red);">+</button>
        </div>
      </div>
    </div>

    <div class="card" style="border-left-color: var(--green);">
      <span class="card-label">TeleOp Phase</span>
      <div class="counter-box">
        <span style="font-size: 0.8rem;">TOTAL PIECES</span>
        <div style="display: flex; align-items: center;">
          <button class="btn-circle btn-minus" onclick="updateCount('teleop', -1)">-</button>
          <span class="counter-val" id="teleop-count">0</span>
          <button class="btn-circle btn-plus" onclick="updateCount('teleop', 1)" style="background: var(--green);">+</button>
        </div>
      </div>
    </div>

    <button class="btn-main" onclick="generateReport()">COMPILE MISSION REPORT</button>
  </div>

  <div id="screen-report" class="screen">
    <div class="card">
      <span class="card-label">Final Intelligence Report</span>
      <div class="report-box">
        <div class="report-item"><span class="report-key">Auto Efficiency</span><span class="report-val" id="rep-auto-eff">0%</span></div>
        <div class="report-item"><span class="report-key">TeleOp Cycle</span><span class="report-val" id="rep-tele">0 Pieces</span></div>
        <div class="report-item"><span class="report-key" id="report-meta">...</span></div>
      </div>
      <button class="btn-main" onclick="goBack()" style="background: #333; color: #fff; margin-top: 24px;">NEW SCAN</button>
    </div>
  </div>

  <div id="screen-intel" class="screen">
    <div class="card">
      <span class="card-label">Search Team History</span>
      <div style="display: flex; gap: 10px;">
        <input type="number" id="search-team-id" class="input-field" placeholder="Team ID...">
        <button class="btn-main" onclick="fetchTeamIntel()" style="width: 80px; margin: 0; padding: 0;">GO</button>
      </div>
    </div>

    <div id="intel-results" style="display: none;">
      <div class="intel-grid">
        <div class="i-box"><div class="i-label">OPR</div><div class="i-val" id="res-opr">-</div></div>
        <div class="i-box"><div class="i-label">Avg L3</div><div class="i-val" id="res-al3">-</div></div>
      </div>
      
      <div class="card">
        <span class="card-label">Performance Data</span>
        <div class="report-item"><span class="report-key">Last 3 Scores</span><span class="report-val" id="res-s3">-</span></div>
        <div class="report-item"><span class="report-key">Auto Trends</span><span class="report-val" id="res-au">-</span></div>
      </div>

      <div class="card" style="border-left-color: var(--green);">
        <span class="card-label">Strategic Notes</span>
        <div class="note-box" id="res-strat">-</div>
        <label class="card-label" style="margin-top: 10px;">Sorting</label>
        <div class="note-box" id="res-sort">-</div>
      </div>
    </div>
  </div>

</div>

<script>
  // Link-ul tau de script
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxnBypxmGW-vaI5C6XhLj2f24bL52KBDumMeSM_xz0bk06gq35HclJ6_r8AxvJACh_s/exec';
  const sessionId = Math.random().toString(36).substring(2, 8).toUpperCase();

  let state = {
    team_nr: '',
    match_nr: '',
    auto_in: 0,
    auto_missed: 0,
    teleop: 0
  };

  // Functia de Toggle intre Scouter si Search
  let isSearchMode = false;
  function toggleSearch() {
    isSearchMode = !isSearchMode;
    document.getElementById('screen-scouter').classList.toggle('active', !isSearchMode);
    document.getElementById('screen-intel').classList.toggle('active', isSearchMode);
    document.getElementById('nav-btn').textContent = isSearchMode ? "BACK" : "SEARCH INTEL";
    if(!isSearchMode) document.getElementById('screen-report').classList.remove('active');
  }

  // Functia de FETCH (Cercetare echipa)
  async function fetchTeamIntel() {
    const team = document.getElementById('search-team-id').value;
    if(!team) return;
    document.getElementById('nav-btn').textContent = "LOADING...";

    try {
      const response = await fetch(`${scriptURL}?team=${team}`);
      const data = await response.json();

      document.getElementById('intel-results').style.display = 'block';
      document.getElementById('res-opr').textContent = data.opr || "N/A";
      document.getElementById('res-al3').textContent = data.avgLast3 || "0";
      document.getElementById('res-s3').textContent = data.last3Scores || "-";
      document.getElementById('res-au').textContent = data.last3Auto || "-";
      document.getElementById('res-strat').textContent = data.strategy || "N/A";
      document.getElementById('res-sort').textContent = data.sorting || "N/A";
    } catch (e) {
      alert("Error: Team not found.");
    } finally {
      document.getElementById('nav-btn').textContent = "BACK";
    }
  }

  // LOGICA TA ORIGINALA DE COUNTER
  function updateCount(key, delta) {
    state[key] = Math.max(0, state[key] + delta);
    document.getElementById(key.replace('_', '-') + '-count').textContent = state[key];
  }

  function generateReport() {
    state.match_nr = document.getElementById('match-number').value;
    state.team_nr = document.getElementById('team-number').value;

    if(!state.match_nr || !state.team_nr) {
      alert('Missing Match or Team ID');
      return;
    }

    document.getElementById('rep-tele').textContent = `${state.teleop} Pieces`;
    const autoTotal = state.auto_in + state.auto_missed;
    document.getElementById('rep-auto-eff').textContent = 
      `${autoTotal > 0 ? Math.round((state.auto_in / autoTotal) * 100) : 0}%`;

    const now = new Date();
    document.getElementById('report-meta').textContent = 
      `Match: ${state.match_nr} | Team: ${state.team_nr} | ID: ${sessionId}`;

    document.getElementById('screen-scouter').classList.remove('active');
    document.getElementById('screen-report').classList.add('active');

    // Trimitere la Sheets (POST)
    const payload = {
      team: state.team_nr,
      scor: state.teleop,
      autoData: `${state.auto_in}(${autoTotal})`
    };
    fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
  }

  function goBack() {
    state = { team_nr: '', match_nr: '', auto_in: 0, auto_missed: 0, teleop: 0 };
    document.querySelectorAll('.counter-val').forEach(el => el.textContent = '0');
    document.getElementById('match-number').value = '';
    document.getElementById('team-number').value = '';
    document.getElementById('screen-report').classList.remove('active');
    document.getElementById('screen-scouter').classList.add('active');
  }
</script>
</body>
</html>
