<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DECODE HUB V5.0 - PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --yellow: #e8c93a; --black: #0a0a0a; --white: #f5f5f0; --border: #333; --green: #00e676; --red: #ff4d4d; --glow: 0 0 15px rgba(232, 201, 58, 0.3); }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--black); color: var(--white); font-family: 'Space Mono', monospace; background-image: radial-gradient(circle at 50% 50%, #151515 0%, #0a0a0a 100%); }

  .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 2px solid var(--yellow); background: #000; position: sticky; top: 0; z-index: 100; }
  h1 { font-family: 'Bebas Neue'; font-size: 2.5rem; color: var(--yellow); letter-spacing: 2px; text-shadow: var(--glow); }
  .btn-nav { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); padding: 8px 15px; font-family: 'Bebas Neue'; font-size: 1.1rem; cursor: pointer; }

  .container { width: 100%; max-width: 450px; margin: auto; min-height: 100vh; }
  .screen { display: none; padding: 25px 20px; animation: scanIn 0.4s ease; }
  .screen.active { display: block; }
  @keyframes scanIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .sub { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; display: block; text-align: center; }
  .card { background: rgba(26, 26, 26, 0.8); border: 1px solid var(--border); padding: 20px; margin-bottom: 15px; position: relative; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--yellow); }
  label { font-size: 0.65rem; color: var(--yellow); text-transform: uppercase; display: block; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
  
  input, select { width: 100%; background: #000; border: 1px solid #444; padding: 15px; color: #fff; font-family: 'Space Mono'; outline: none; font-size: 1.1rem; }

  .btn-act { width: 100%; background: var(--yellow); color: #000; border: none; padding: 18px; font-family: 'Bebas Neue'; font-size: 1.6rem; cursor: pointer; box-shadow: var(--glow); transition: 0.2s; }
  .btn-act:active { transform: scale(0.98); }
  
  .val-big { font-family: 'Bebas Neue'; font-size: 3.2rem; color: var(--yellow); line-height: 1; }
  .val-med { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--white); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }

  #loader { display: none; position: fixed; top: 85px; left: 50%; transform: translateX(-50%); background: var(--yellow); color: #000; padding: 8px 20px; font-weight: bold; z-index: 200; font-size: 0.75rem; border-radius: 20px; }
  
  #success-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
  .success-icon { font-size: 5rem; color: var(--green); margin-bottom: 15px; }
</style>
</head>
<body>

<div id="loader">DATA LINK ACTIVE...</div>

<div id="success-overlay">
    <div class="success-icon">✓</div>
    <h1 style="color: var(--white); font-family: 'Bebas Neue'; letter-spacing: 3px;">UPLINK COMPLETE</h1>
</div>

<div class="container">
    <div class="nav-bar">
        <h1>DECODE</h1>
        <button class="btn-nav" id="mode-btn" onclick="toggleSearch()">INTEL SEARCH</button>
    </div>

    <div id="screen-scout" class="screen active">
        <span class="sub">// DATA ACQUISITION //</span>
        <div class="grid-2">
            <div><label>Team ID</label><input type="number" id="t-id" placeholder="0000" oninput="if(this.value.length > 5) this.value = this.value.slice(0, 5);"></div>
            <div><label>Position</label><select id="p-id"><option>R ap</option><option>R dep</option><option>A ap</option><option>A dep</option></select></div>
        </div>
        
        <div class="card"><label>Auto Pieces</label>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="btn-act" style="flex:2" onclick="upd('a_in', 1)">+ ADD</button>
                <div class="val-big" id="v-a_in" style="min-width:50px; text-align:center;">0</div>
                <button class="btn-act" style="flex:1; background:#333; color:#666; font-size:1rem;" onclick="upd('a_in', -1)">Undo</button>
            </div>
        </div>

        <div class="card"><label>TeleOp Pieces</label>
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="btn-act" style="flex:2; background:var(--green);" onclick="upd('tele', 1)">+ ADD</button>
                <div class="val-big" id="v-tele" style="min-width:50px; text-align:center;">0</div>
                <button class="btn-act" style="flex:1; background:#333; color:#666; font-size:1rem;" onclick="upd('tele', -1)">Undo</button>
            </div>
        </div>

        <div class="card" style="display:flex; align-items:center; gap:15px; padding:15px;">
            <input type="checkbox" id="park" style="width:25px; height:25px; accent-color:var(--yellow);">
            <label for="park" style="margin:0; font-size:0.9rem; color:var(--white);">Parking Successful</label>
        </div>
        
        <button class="btn-act" style="height:80px; font-size:2rem; margin-top:10px;" onclick="showReport()">COMPILE & SEND</button>
    </div>

    <div id="screen-search" class="screen">
        <span class="sub">// DATABASE INTEL //</span>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input type="number" id="q-team" placeholder="Search ID...">
            <button class="btn-act" style="width:100px;" onclick="searchTeam()">SCAN</button>
        </div>
        
        <div id="results" style="display:none;">
            <div class="grid-2">
                <div class="card" style="text-align:center;"><label>AVG GENERAL</label><div id="r-avg-gen" class="val-big">--</div></div>
                <div class="card" style="text-align:center;"><label>AVG LAST 3</label><div id="r-avg-l3" class="val-big" style="color:var(--green);">--</div></div>
            </div>

            <div class="card"><label>LAST 3 MATCH HISTORY</label><div id="r-s3" class="val-med">--</div></div>

            <div class="card"><label>PARCARE (Analytics F)</label><div id="r-park" style="color:var(--yellow); font-weight:bold; font-size:1.1rem;">--</div></div>
            
            <div class="card"><label>STRATEGIE TELEOP (Analytics D)</label><div id="r-strat" style="font-size:0.9rem; line-height:1.4; color:var(--white);">--</div></div>
            
            <div class="card"><label>ALTCEVA / NOTE (Analytics M)</label><div id="r-alt" style="font-size:0.85rem; line-height:1.4; color:#888;">--</div></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbzQ8NObaOWt6eDS4Y4XUn9uxpTYFEJr-5XAbkcZwoclMDBPtx70_OmeX37b_dkSUtyF/exec";
    let state = { a_in: 0, tele: 0 };

    function upd(k, v) { state[k] = Math.max(0, state[k] + v); document.getElementById('v-'+k).textContent = state[k]; }

    async function showReport() {
        const team = document.getElementById('t-id').value;
        if(!team) return alert("TEAM ID REQUIRED");
        document.getElementById('loader').style.display = 'block';
        
        const payload = { 
            team: team, 
            position: document.getElementById('p-id').value, 
            autoData: state.a_in + (document.getElementById('park').checked ? " P" : ""), 
            scor: state.tele, 
            rp: 0 
        };

        try {
            await fetch(SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            document.getElementById('success-overlay').style.display = 'flex';
            setTimeout(() => location.reload(), 1500);
        } catch(e) { 
            alert("UPLINK FAILED"); 
            document.getElementById('loader').style.display = 'none';
        }
    }

    function toggleSearch() {
        const isSearch = document.getElementById('screen-search').classList.toggle('active');
        document.getElementById('screen-scout').classList.toggle('active', !isSearch);
        document.getElementById('mode-btn').textContent = isSearch ? "BACK" : "INTEL SEARCH";
    }

    async function searchTeam() {
        const t = document.getElementById('q-team').value;
        if(!t) return;
        
        document.getElementById('loader').style.display = 'block';
        const resDiv = document.getElementById('results');
        resDiv.style.display = 'none';

        try {
            const response = await fetch(`${SCRIPT}?team=${t}`);
            const d = await response.json();
            
            if(d.error) {
                alert("TEAM NOT FOUND");
            } else {
                resDiv.style.display = 'block';
                document.getElementById('r-avg-gen').textContent = d.avgGeneral;
                document.getElementById('r-avg-l3').textContent = d.avgLast3;
                document.getElementById('r-s3').textContent = d.last3Scores;
                
                document.getElementById('r-park').textContent = d.parcare || "N/A";
                document.getElementById('r-strat').textContent = d.strategie || "N/A";
                document.getElementById('r-alt').textContent = d.altceva || "N/A";
            }
        } catch(e) { 
            alert("CONNECTION ERROR"); 
        }
        document.getElementById('loader').style.display = 'none';
    }
</script>
</body>
</html>
