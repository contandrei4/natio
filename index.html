<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRC National Scouting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --yellow: #e8c93a; --black: #111; --white: #f5f5f0; --gray: #2a2a2a; --red: #e04b2a; --green: #4caf87; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--white); font-family: 'Space Mono', monospace; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
  .app-container { width: 100%; max-width: 420px; background: #161616; border: 1px solid #333; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  h1 { font-family: 'Bebas Neue'; font-size: 2.8rem; color: var(--yellow); letter-spacing: 2px; text-align: center; margin-bottom: 25px; line-height: 1; }
  .input-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.75rem; color: var(--yellow); margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
  input, select { width: 100%; background: var(--gray); border: 1px solid #444; padding: 14px; color: white; font-family: 'Space Mono'; font-size: 1rem; outline: none; }
  input:focus { border-color: var(--yellow); }
  .counter-card { background: #1f1f1f; border-left: 4px solid var(--yellow); padding: 15px; margin-bottom: 15px; }
  .controls { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .btn-add { flex: 2; background: var(--yellow); color: black; border: none; padding: 15px; font-family: 'Bebas Neue'; font-size: 1.4rem; cursor: pointer; transition: 0.2s; }
  .btn-add:active { transform: scale(0.98); opacity: 0.9; }
  .btn-undo { flex: 1; background: #333; color: #999; border: none; padding: 15px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
  .count-display { font-size: 2.2rem; min-width: 50px; text-align: center; font-family: 'Bebas Neue'; color: var(--white); }
  .parking-box { display: flex; align-items: center; gap: 15px; background: #1f1f1f; padding: 15px; margin-bottom: 20px; border: 1px solid #333; cursor: pointer; }
  .parking-box input { width: 22px; height: 22px; cursor: pointer; }
  .btn-send { width: 100%; background: var(--yellow); color: black; border: none; padding: 20px; font-family: 'Bebas Neue'; font-size: 1.8rem; cursor: pointer; margin-top: 10px; }
  .btn-send:disabled { background: #555; cursor: not-allowed; }
</style>
</head>
<body>

<div class="app-container">
  <h1>NATIONAL SCOUTING</h1>
  
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
    <div class="input-group">
      <label>Team Number</label>
      <input type="number" id="team-number" placeholder="0000">
    </div>
    <div class="input-group">
      <label>Position</label>
      <select id="pos-select">
        <option value="R ap">R ap</option>
        <option value="R dep">R dep</option>
        <option value="A ap">A ap</option>
        <option value="A dep">A dep</option>
      </select>
    </div>
  </div>

  <div class="counter-card">
    <label>AUTO IN</label>
    <div class="controls">
      <button class="btn-add" onclick="change('auto_in', 1)">+1 Piece</button>
      <div class="count-display" id="val-auto-in">0</div>
      <button class="btn-undo" onclick="change('auto_in', -1)">Undo</button>
    </div>
  </div>

  <div class="counter-card" style="border-left-color: var(--red);">
    <label style="color:var(--red)">AUTO MISSED</label>
    <div class="controls">
      <button class="btn-add" style="background:var(--red); color:white" onclick="change('auto_missed', 1)">+1 Miss</button>
      <div class="count-display" id="val-auto-missed">0</div>
      <button class="btn-undo" onclick="change('auto_missed', -1)">Undo</button>
    </div>
  </div>

  <div class="counter-card" style="border-left-color: var(--green);">
    <label style="color:var(--green)">TELEOP SCORE</label>
    <div class="controls">
      <button class="btn-add" style="background:var(--green); color:white" onclick="change('teleop', 1)">+1 Score</button>
      <div class="count-display" id="val-teleop">0</div>
      <button class="btn-undo" onclick="change('teleop', -1)">Undo</button>
    </div>
  </div>

  <label class="parking-box">
    <input type="checkbox" id="parking-check">
    <span style="color:var(--yellow); font-weight:bold; font-size:0.8rem;">PARKING ACHIEVED (P)</span>
  </label>

  <div class="input-group">
    <label>Match RP Total</label>
    <input type="number" id="rp-input" value="0">
  </div>
  
  <button class="btn-send" id="btn-submit" onclick="sendData()">SUBMIT TO SHEETS</button>
</div>

<script>
  let state = { auto_in: 0, auto_missed: 0, teleop: 0 };
  
  // URL-ul tau de la Nationala
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz96eVepKPWtpZlpaTYJYIXKzwrK4ZE6bZQoDOOSH8uncZJao0jQueFrv4YxvlEgDQ/exec";

  function change(key, val) {
    state[key] = Math.max(0, state[key] + val);
    document.getElementById(`val-${key.replace('_', '-')}`).textContent = state[key];
  }

  async function sendData() {
    const team = document.getElementById('team-number').value;
    if (!team) return alert("Please enter a Team Number!");

    const btn = document.getElementById('btn-submit');
    const originalText = btn.textContent;
    btn.textContent = "SENDING...";
    btn.disabled = true;

    const autoString = `${state.auto_in}(${state.auto_in + state.auto_missed})${document.getElementById('parking-check').checked ? 'P' : ''}`;

    const payload = {
      team: team,
      position: document.getElementById('pos-select').value,
      autoData: autoString,
      scor: state.teleop,
      rp: document.getElementById('rp-input').value
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(payload)
      });
      
      alert("Success! Data sent to Nationals.");
      // Resetare formular
      state = { auto_in: 0, auto_missed: 0, teleop: 0 };
      document.querySelectorAll('.count-display').forEach(d => d.textContent = '0');
      document.getElementById('team-number').value = '';
      document.getElementById('parking-check').checked = false;
      document.getElementById('rp-input').value = '0';
      
    } catch (e) {
      alert("Error connecting to server. Check your internet.");
    } finally {
      btn.textContent = originalText;
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
