<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DECODE HUB V31.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #e8c93a; --black: #0a0a0a; --white: #f5f5f0; --red: #ff4d4d; --blue: #3498db; --green: #00e676; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Mono', monospace; }
        body { background: var(--black); color: var(--white); overflow-x: hidden; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 2px solid var(--yellow); background: #000; position: sticky; top: 0; z-index: 100; }
        h1 { font-family: 'Bebas Neue'; font-size: 2.2rem; color: var(--yellow); }
        .container { width: 100%; max-width: 450px; margin: auto; padding: 10px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--yellow); }
        label { font-size: 0.7rem; color: var(--yellow); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; background: #000; border: 1px solid #444; padding: 12px; color: #fff; margin-bottom: 5px; font-size: 1rem; }
        .btn-act { width: 100%; background: var(--yellow); color: #000; border: none; padding: 15px; font-family: 'Bebas Neue'; font-size: 1.5rem; cursor: pointer; }
        .val { font-family: 'Bebas Neue'; font-size: 2.8rem; min-width: 60px; text-align: center; }
        .counter-row { display: flex; align-items: center; gap: 10px; }
        .btn-undo { flex: 1; background: #262626; color: #888; border: 1px solid #333; padding: 12px; font-size: 0.8rem; }
        #loader { display: none; position: fixed; top: 75px; left: 50%; transform: translateX(-50%); background: var(--yellow); color: #000; padding: 5px 15px; z-index: 200; font-weight: bold; border-radius: 10px; }
    </style>
</head>
<body>

<div id="loader">UPLINKING...</div>

<div class="container">
    <div class="nav-bar">
        <h1>DECODE</h1>
        <button class="btn-nav" id="mode-btn" onclick="toggleSearch()" style="background:transparent; border:1px solid var(--yellow); color:var(--yellow); padding:5px; font-family:'Bebas Neue'">INTEL SEARCH</button>
    </div>

    <div id="screen-scout" class="screen active">
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div><label>Team ID</label><input type="number" id="t-id" placeholder="19000"></div>
            <div><label>Match #</label><input type="number" id="m-num" placeholder="12"></div>
        </div>
        
        <label>Position</label>
        <select id="p-id" style="margin-bottom:15px; border-left: 5px solid var(--yellow);">
            <option value="R ap">RED - Aproape</option>
            <option value="R dep">RED - Departe</option>
            <option value="A ap">BLUE - Aproape</option>
            <option value="A dep">BLUE - Departe</option>
        </select>

        <div class="card"><label>Auto Scored</label>
            <div class="counter-row"><button class="btn-act" onclick="upd('a_in', 1)">+ PIECE</button><div class="val" id="v-a_in">0</div><button class="btn-undo" onclick="upd('a_in', -1)">Undo</button></div>
        </div>

        <div class="card" style="border-left-color: var(--red)"><label style="color:var(--red)">Auto Missed</label>
            <div class="counter-row"><button class="btn-act" style="background:var(--red); color:white" onclick="upd('a_ms', 1)">+ MISS</button><div class="val" id="v-a_ms">0</div><button class="btn-undo" onclick="upd('a_ms', -1)">Undo</button></div>
        </div>

        <div class="card" style="border-left-color: var(--green)"><label style="color:var(--green)">TeleOp Pieces</label>
            <div class="counter-row"><button class="btn-act" style="background:var(--green); color:white" onclick="upd('tele', 1)">+ PIECE</button><div class="val" id="v-tele">0</div><button class="btn-undo" onclick="upd('tele', -1)">Undo</button></div>
        </div>
        
        <div class="card" style="display:flex; align-items:center; gap:12px;">
            <input type="checkbox" id="park" style="width:25px; height:25px;"><label for="park" style="margin:0">Ascent / Park</label>
        </div>

        <div class="card"><label>RP Value</label><input type="number" id="rp-val" value="0"></div>
        <button class="btn-act" style="height:70px; font-size:1.8rem;" onclick="showReport()">GENERATE REPORT</button>
    </div>

    <div id="screen-report" class="screen">
        <div class="card" style="background:#000; border: 2px solid var(--yellow); padding: 20px;">
            <label style="text-align:center; font-size: 1.2rem; color: var(--yellow)">MISSION SUMMARY</label>
            <p>MATCH: <span id="rep-match" style="color:var(--yellow)"></span></p>
            <p>TEAM: <span id="rep-team"></span></p>
            <p>AUTO: <span id="rep-auto"></span></p>
            <p>TELE: <span id="rep-tele"></span></p>
        </div>
        <button class="btn-act" style="background: var(--green); color: black;" onclick="confirmAndSend()">CONFIRM & UPLINK</button>
        <button class="btn-undo" style="width:100%; margin-top:10px;" onclick="cancelReport()">BACK</button>
    </div>

    <div id="screen-search" class="screen">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="number" id="q-team" placeholder="Team ID...">
            <button class="btn-act" style="width:80px" onclick="searchTeam()">SCAN</button>
        </div>
        <div id="results" style="display:none">
            <div class="card"><label>AVG TELE</label><div id="r-avg-gen" style="font-size:2rem; color:var(--yellow)">--</div></div>
            <div class="card"><label>Max Auto (AP/DEP)</label><div style="font-size:1.2rem"><span id="r-max-ap" style="color:var(--green)">--</span> / <span id="r-max-dep" style="color:var(--blue)">--</span></div></div>
            <div class="card"><label>Evolution</label><div style="height:120px"><canvas id="scoreChart"></canvas></div></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbwpf6AFNY8TsFvKiqGLiiolmw8xG8TTBL8escENU0HrPURX-ErRM-___PVp2MolFv6A/exec"; 
    let state = { a_in: 0, a_ms: 0, tele: 0 };
    let myChart = null;

    function upd(k, v) { state[k] = Math.max(0, state[k] + v); document.getElementById('v-' + k).textContent = state[k]; }
    function toggleSearch() {
        const isS = document.getElementById('screen-search').classList.toggle('active');
        document.getElementById('screen-scout').classList.toggle('active', !isS);
    }

    function showReport() {
        const team = document.getElementById('t-id').value;
        const match = document.getElementById('m-num').value;
        const pos = document.getElementById('p-id').value;
        if(!team || !match) return Swal.fire('Eroare', 'Team ID și Match # sunt obligatorii!', 'error');

        document.getElementById('rep-team').textContent = team;
        document.getElementById('rep-match').textContent = pos.charAt(0) + match;
        const p = document.getElementById('park').checked ? "P" : "";
        document.getElementById('rep-auto').textContent = `${state.a_in}(${state.a_in+state.a_ms})${p}`;
        document.getElementById('rep-tele').textContent = state.tele;
        
        document.getElementById('screen-scout').classList.remove('active');
        document.getElementById('screen-report').classList.add('active');
    }

    function cancelReport() { document.getElementById('screen-report').classList.remove('active'); document.getElementById('screen-scout').classList.add('active'); }

    async function confirmAndSend() {
        document.getElementById('loader').style.display = 'block';
        const team = document.getElementById('t-id').value;
        const pos = document.getElementById('p-id').value;
        const mNum = document.getElementById('m-num').value;
        const park = document.getElementById('park').checked ? "P" : "";
        const auto = `${state.a_in}(${state.a_in+state.a_ms})${park}`;
        const rp = document.getElementById('rp-val').value;

        const url = `${SCRIPT}?team=${team}&position=${encodeURIComponent(pos)}&autoData=${encodeURIComponent(auto)}&scor=${state.tele}&rp=${rp}&matchNum=${mNum}`;
        
        try {
            const resp = await fetch(url, { method: 'GET', mode: 'no-cors' });
            document.getElementById('loader').style.display = 'none';
            Swal.fire({ title: 'SUCCESS', icon: 'success', timer: 1000, showConfirmButton: false }).then(() => location.reload());
        } catch(e) { document.getElementById('loader').style.display = 'none'; Swal.fire('Eroare', 'Verifică noul URL de Deployment!', 'error'); }
    }

    async function searchTeam() {
        const t = document.getElementById('q-team').value; if(!t) return;
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`${SCRIPT}?team=${t}`);
            const d = await res.json();
            document.getElementById('results').style.display = 'block';
            document.getElementById('r-avg-gen').textContent = d.avgGeneral;
            document.getElementById('r-max-ap').textContent = d.maxAutoAp;
            document.getElementById('r-max-dep').textContent = d.maxAutoDep;
            if(d.chartData) updateChart(d.chartData);
        } catch(e) { Swal.fire('Eroare', 'Echipa nu există sau URL greșit', 'error'); }
        document.getElementById('loader').style.display = 'none';
    }

    function updateChart(pts) {
        const ctx = document.getElementById('scoreChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: pts.map((_,i)=>i+1), datasets: [{ data: pts, borderColor: '#e8c93a', tension: 0.3 }] },
            options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { beginAtZero: true } }, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
