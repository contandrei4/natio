<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decode Counter – FRC Scouting</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* STILUL ORIGINAL DIN DECODE-COUNTER (4).HTML */
  :root {
    --yellow: #e8c93a;
    --black: #111;
    --white: #f5f5f0;
    --gray: #2a2a2a;
    --red: #e04b2a;
    --green: #4caf87;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(232,201,58,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(224,75,42,0.05) 0%, transparent 50%);
  }

  .app-container {
    width: 100%;
    max-width: 420px;
    background: #161616;
    border: 1px solid #333;
    position: relative;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .screen { display: none; padding: 24px; }
  .screen.active { display: block; }

  h1 { font-family: 'Bebas Neue'; font-size: 3rem; color: var(--yellow); letter-spacing: 2px; line-height: 0.9; margin-bottom: 8px; }
  .subtitle { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-bottom: 32px; }

  .input-group { margin-bottom: 24px; position: relative; }
  .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--yellow); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
  
  input, select {
    width: 100%;
    background: var(--gray);
    border: 1px solid #333;
    padding: 14px;
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    outline: none;
    transition: all 0.2s;
  }
  input:focus, select:focus { border-color: var(--yellow); background: #333; }

  .counter-card { background: #1a1a1a; border: 1px solid #333; padding: 20px; margin-bottom: 16px; position: relative; }
  .counter-label { font-family: 'Bebas Neue'; font-size: 1.2rem; color: #888; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .counter-label span.badge { background: var(--yellow); color: black; padding: 2px 8px; font-size: 0.8rem; }

  .controls { display: flex; align-items: center; gap: 16px; }
  .btn-main { flex-grow: 1; background: var(--yellow); color: black; border: none; padding: 16px; font-family: 'Bebas Neue'; font-size: 1.5rem; cursor: pointer; transition: transform 0.1s; }
  .btn-undo { background: #333; color: #888; border: none; padding: 16px; font-size: 0.7rem; font-family: 'Space Mono'; cursor: pointer; text-transform: uppercase; }
  .count-display { font-size: 2.5rem; font-weight: 700; min-width: 60px; text-align: center; font-family: 'Bebas Neue'; }

  .extra-row { display: flex; align-items: center; gap: 12px; background: #1a1a1a; border: 1px solid #333; padding: 15px; margin-bottom: 16px; cursor: pointer; }
  .extra-row input { width: 22px; height: 22px; accent-color: var(--yellow); }

  .report-box { background: var(--gray); border-left: 4px solid var(--yellow); padding: 20px; margin-bottom: 24px; }
  .report-item { margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 8px; }
  .report-label { font-size: 0.7rem; text-transform: uppercase; color: #888; }
  .report-value { font-family: 'Bebas Neue'; font-size: 1.8rem; color: var(--yellow); }

  #logs-list { margin-top: 20px; border-top: 1px solid #333; padding-top: 10px; max-height: 120px; overflow-y: auto; }
  .log-entry { font-size: 0.65rem; color: #555; margin-bottom: 4px; font-family: 'Space Mono'; }
</style>
</head>
<body>

<div class="app-container">
  
  <div id="screen-login" class="screen active">
    <h1>DECODE<br>SCOUTING</h1>
    <div class="subtitle">National Championship</div>
    <div class="input-group">
      <label>Scouter ID</label>
      <input type="text" id="scouter-id" placeholder="Ex: Scout_01">
    </div>
    <button class="btn-main" id="btn-login" style="width:100%;" onclick="startApp()">Initialize</button>
  </div>

  <div id="screen-scouter" class="screen">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px;">
      <h1 style="font-size:1.5rem">MATCH DATA</h1>
      <span id="display-id" style="color:var(--yellow); font-size:0.7rem; font-weight:700;"></span>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
        <div class="input-group">
            <label>Team Number</label>
            <input type="number" id="team-number" placeholder="0000">
        </div>
        <div class="input-group">
            <label>Position</label>
            <select id="pos-select">
                <option value="R ap">R ap</option>
                <option value="R dep">R dep</option>
                <option value="A ap">A ap</option>
                <option value="A dep">A dep</option>
            </select>
        </div>
    </div>

    <div class="counter-card">
      <div class="counter-label">AUTO IN <span class="badge" id="badge-in">0</span></div>
      <div class="controls">
        <button class="btn-main" onclick="change('auto_in', 1)">+1 Piece</button>
        <div class="count-display" id="val-auto-in">0</div>
        <button class="btn-undo" onclick="change('auto_in', -1)">Undo</button>
      </div>
    </div>

    <div class="counter-card" style="border-color: var(--red);">
      <div class="counter-label" style="color:var(--red)">AUTO MISSED <span class="badge" id="badge-missed" style="background:var(--red); color:white">0</span></div>
      <div class="controls">
        <button class="btn-main" style="background:var(--red); color:white" onclick="change('auto_missed', 1)">+1 Miss</button>
        <div class="count-display" id="val-auto-missed">0</div>
        <button class="btn-undo" onclick="change('auto_missed', -1)">Undo</button>
      </div>
    </div>

    <div class="counter-card" style="border-color: var(--green);">
      <div class="counter-label" style="color:var(--green)">SCOR (TELEOP)</div>
      <div class="controls">
        <button class="btn-main" style="background:var(--green); color:white" onclick="change('teleop', 1)">+1 Score</button>
        <div class="count-display" id="val-teleop">0</div>
        <button class="btn-undo" onclick="change('teleop', -1)">Undo</button>
      </div>
    </div>

    <label class="extra-row">
      <input type="checkbox" id="parking-check">
      <span style="color:var(--yellow); font-size:0.8rem; font-weight:700;">PARKING BIFAT (P)</span>
    </label>

    <div class="input-group">
      <label>RP-uri Total Meci</label>
      <input type="number" id="rp-input" placeholder="0">
    </div>

    <button class="btn-main" style="width:100%; padding:20px;" onclick="showReport()">Generate Report</button>
  </div>

  <div id="screen-report" class="screen">
    <h1>REPORT</h1>
    <div class="report-box" id="report-content"></div>
    <button class="btn-main" id="btn-send" style="width:100%; padding:20px; margin-bottom:12px;" onclick="finalizeAndSend()">Confirm & Send</button>
    <button class="btn-undo" style="width:100%;" onclick="switchScreen('screen-scouter')">Back to Edit</button>
    <div id="logs-list"></div>
  </div>

</div>

<script>
  let state = { auto_in: 0, auto_missed: 0, teleop: 0 };
  let sessionId = "";

  // URL-URILE TALE INTEGRATE
  const SCRIPT_URL_AUTH_LOG = "https://script.google.com/macros/s/AKfycbxoPEqXdcJyZvlc--Q2Fb88vYBZank5exIzt_NwPe8BB9J1wpHgkAVoY5Quze7DgqeE/exec";
  const SCRIPT_URL_NATIONALA = "https://script.google.com/macros/s/AKfycbyBRae0CXMyPozcmEEQNPU2OxqNQsDxWigg9cAsqnoeilPzUelUZKQd3ETPtligj8F-/exec";

  async function startApp() {
    const idInput = document.getElementById('scouter-id').value.trim();
    if (!idInput) return alert("Please enter Scouter ID");

    const btn = document.getElementById('btn-login');
    btn.textContent = "VERIFYING...";
    btn.disabled = true;

    try {
      // Pasul 1: Verificare Scouter (GET conform codului tau)
      const response = await fetch(`${SCRIPT_URL_AUTH_LOG}?action=auth&id=${idInput}`);
      const result = await response.text();
      
      if (result.trim() === 'valid') {
        sessionId = idInput;
        document.getElementById('display-id').textContent = "ID: " + sessionId;
        switchScreen('screen-scouter');
      } else {
        alert("ID Scouter Invalid!");
      }
    } catch (e) {
      alert("Error connecting to Auth server.");
    } finally {
      btn.textContent = "Initialize";
      btn.disabled = false;
    }
  }

  function change(key, val) {
    state[key] = Math.max(0, state[key] + val);
    const id = key.replace('_', '-');
    document.getElementById(`val-${id}`).textContent = state[key];
    if(key === 'auto_in') document.getElementById('badge-in').textContent = state[key];
    if(key === 'auto_missed') document.getElementById('badge-missed').textContent = state[key];
  }

  function showReport() {
    const team = document.getElementById('team-number').value;
    const rp = document.getElementById('rp-input').value;
    if (!team || rp === "") return alert("Enter team and RP total!");

    const total = state.auto_in + state.auto_missed;
    const isP = document.getElementById('parking-check').checked;
    const autoData = `${state.auto_in}(${total})${isP ? 'P' : ''}`;
    const pos = document.getElementById('pos-select').value;

    document.getElementById('report-content').innerHTML = `
      <div class="report-item"><div class="report-label">Team / Position</div><div class="report-value">${team} / ${pos}</div></div>
      <div class="report-item"><div class="report-label">Auto Stats</div><div class="report-value">${autoData}</div></div>
      <div class="report-item"><div class="report-label">Teleop Score</div><div class="report-value">${state.teleop}</div></div>
      <div class="report-item"><div class="report-label">RPs</div><div class="report-value">${rp}</div></div>
    `;
    switchScreen('screen-report');
  }

  async function finalizeAndSend() {
    const team = document.getElementById('team-number').value;
    const pos = document.getElementById('pos-select').value;
    const total = state.auto_in + state.auto_missed;
    const isP = document.getElementById('parking-check').checked;
    const autoData = `${state.auto_in}(${total})${isP ? 'P' : ''}`;
    const rp = document.getElementById('rp-input').value;
    const ora = new Date().toLocaleTimeString();

    const btn = document.getElementById('btn-send');
    btn.textContent = "SENDING...";
    btn.disabled = true;

    try {
      // Pasul 2: Logare (GET pe scriptul tau de log-uri)
      fetch(`${SCRIPT_URL_AUTH_LOG}?action=log&id=${sessionId}&ora=${ora}&meci=${team}&team=${team}`);

      // Pasul 3: Trimitere date pe Nationala (POST)
      await fetch(SCRIPT_URL_NATIONALA, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          id: sessionId, team: team, position: pos, autoData: autoData, scor: state.teleop, rp: rp
        })
      });

      alert("Match data recorded!");
      
      const log = document.createElement('div');
      log.className = 'log-entry';
      log.textContent = `> [${ora}] Team ${team} sent by ${sessionId}`;
      document.getElementById('logs-list').prepend(log);
      
      resetForm();
      switchScreen('screen-scouter');
    } catch (e) {
      alert("Transmission error!");
    } finally {
      btn.textContent = "Confirm & Send";
      btn.disabled = false;
    }
  }

  function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  }

  function resetForm() {
    state = { auto_in: 0, auto_missed: 0, teleop: 0 };
    document.getElementById('team-number').value = '';
    document.getElementById('rp-input').value = '';
    document.getElementById('parking-check').checked = false;
    document.getElementById('val-auto-in').textContent = '0';
    document.getElementById('val-auto-missed').textContent = '0';
    document.getElementById('val-teleop').textContent = '0';
    document.getElementById('badge-in').textContent = '0';
    document.getElementById('badge-missed').textContent = '0';
  }
</script>
</body>
</html>
